<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha - Modo Infinito</title>
    <style>
        body {
            background-color: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            border: 4px solid #fff;
            background-color: #111;
        }
        h1 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Placar: <span id="score">0</span></h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 20; // Tamanho de cada quadrado
        const totalSquares = (canvas.width / box) * (canvas.height / box); // 400 quadrados no total
        
        let snake = [{ x: 10 * box, y: 10 * box }];
        let direction = "RIGHT";
        let score = 0;
        let food = generateFood();

        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            if (event.keyCode == 37 && direction != "RIGHT") direction = "LEFT";
            else if (event.keyCode == 38 && direction != "DOWN") direction = "UP";
            else if (event.keyCode == 39 && direction != "LEFT") direction = "RIGHT";
            else if (event.keyCode == 40 && direction != "UP") direction = "DOWN";
        }

        // Função para gerar comida garantindo que não nasça dentro do corpo da cobra
        function generateFood() {
            let newFood;
            let foodInSnake = true;

            while (foodInSnake) {
                newFood = {
                    x: Math.floor(Math.random() * 20) * box,
                    y: Math.floor(Math.random() * 20) * box
                };
                
                // Verifica se a posição gerada bate com alguma parte da cobra
                foodInSnake = snake.some(part => part.x === newFood.x && part.y === newFood.y);
            }
            return newFood;
        }

        function drawGame() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Desenha a cobrinha
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? "#4CAF50" : "#81C784";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#111";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Desenha a comida
            ctx.fillStyle = "#FF5722";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (direction == "LEFT") snakeX -= box;
            if (direction == "UP") snakeY -= box;
            if (direction == "RIGHT") snakeX += box;
            if (direction == "DOWN") snakeY += box;

            // Se comer a comida
            if (snakeX === food.x && snakeY === food.y) {
                score++;
                scoreElement.innerText = score;

                // Se o tamanho da cobra atingir o total de blocos, você zerou o jogo!
                if (snake.length + 1 === totalSquares) {
                    clearInterval(game);
                    alert("Incrível! Você preencheu o mapa inteiro e venceu o jogo! Placar final: " + score);
                    location.reload();
                    return;
                }
                
                food = generateFood();
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Colisões normais de Game Over
            if (
                snakeX < 0 || snakeX >= canvas.width || 
                snakeY < 0 || snakeY >= canvas.height ||
                collision(newHead, snake)
            ) {
                clearInterval(game);
                alert("Fim de Jogo! Seu placar foi: " + score);
                location.reload();
                return;
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x === array[i].x && head.y === array[i].y) {
                    return true;
                }
            }
            return false;
        }

        let game = setInterval(drawGame, 100);
    </script>
</body>
</html>
